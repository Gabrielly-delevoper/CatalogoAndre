<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Quadros Rio de Janeiro | André Batista Decor
    </title>

    <meta
        name="description"
        content="Coleção de quadros inspirados nas paisagens e na essência do Rio de Janeiro."
    >

    <link
        rel="canonical"
        href="https://gabrielly-delevoper.github.io/CatalogoAndre/quadros-rio-de-janeiro.html"
    >

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>
  <section class="hero-rio">

    <div class="hero-conteudo">

        <h1>
            Quadros Rio de Janeiro
        </h1>

        <p>
            Coleção inspirada nas paisagens, arquitetura
            e essência carioca para ambientes modernos.
        </p>

    </div>

</section>
    <section class="colecao-rio">

    <div class="container-rio">

        <h2>
            Coleção Inspirada no Rio de Janeiro
        </h2>

        <p class="descricao-rio">

            Quadros decorativos inspirados nas paisagens,
            arquitetura e cultura carioca.

        </p>

        <div class="grid-rio">

            <article class="card-rio">

                <img
                    src="Imagens/Redentor ao Luar.png"
                    alt="Quadro decorativo Cristo Redentor moderno"
                    loading="lazy"
                >

                <h3>
                    Redentor ao Luar
                </h3>

            </article>

            <article class="card-rio">

                <img
                    src="Imagens/Pão de Açúcar.png"
                    alt="Quadro decorativo Pão de Açúcar moderno"
                    loading="lazy"
                >

                <h3>
                    Pão de Açúcar
                </h3>

            </article>

            <article class="card-rio">

                <img
                    src="Imagens/Lagoa & Corcovado.jpeg"
                    alt="Quadro decorativo Lagoa e Corcovado"
                    loading="lazy"
                >

                <h3>
                    Lagoa & Corcovado
                </h3>

            </article>

        </div>

    </div>

</section>
    
  
</body>

</html>
