<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André Batista - Catálogo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topo">
        <div class="esquerda">
            <div class="logo-container">
              <img src="https://drive.google.com/thumbnail?id=1LVYmqsNlKuK6CI3Is2wZ33Rej7UtQe0H&sz=w1000">
            </div>
        </div>

        <div class="centro">
            <h1>André Batista Decor</h1>
        </div>

        <div class="direita">
            <button class="btn-carrinho" onclick="toggleCarrinho()">
                🛒 <span id="contador">0</span>
            </button>
        </div>
    </header>

    <main>
        <div id="catalogo"></div>
    </main>

    <div id="carrinho" class="carrinho-lateral">
        <div class="header-carrinho">
            <h3>O seu Pedido</h3>

            <button onclick="toggleCarrinho()" class="btn-fechar">
                ✕
            </button>
        </div>

        <ul id="lista-carrinho"></ul>

        <div class="total-container">
            <strong>
                Total: R$
                <span id="total-valor">0.00</span>
            </strong>
        </div>

        <button class="btn-finalizar" onclick="enviarWhatsApp()">
            Finalizar no WhatsApp
        </button>
    </div>

    <footer class="rodape">
        <span class="slogan">
            Detalhes que Transformam
        </span>

       <p class="creditos">
    Desenvolvido por: <strong>Gabrielly Batista</strong>
</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
